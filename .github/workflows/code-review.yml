name: AI Code Review

on:
    pull_request:
        types: [opened, synchronize]

jobs:
    review:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: AI Code Review
              uses: nasirul-ahmed/codeguardian-ai@v1.1.0
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                  config-path: ".review.config.json"
